services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newspass
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  retrieval:
    build:
      context: .
      dockerfile: retrieval/Dockerfile
    depends_on:
      - db

  analysis:
    build:
      context: .
      dockerfile: analysis/Dockerfile
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - retrieval
      - analysis
      
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    depends_on:
      - web
    ports:
      - "8080:80"